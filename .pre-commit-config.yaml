# Stage 0 护栏：提交前自动跑 ruff(lint) + ruff-format + pytest。
# 安装：pre-commit install   手动全跑：pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.7
    hooks:
      - id: ruff           # lint（--fix 自动修可修项）
        args: [--fix]
      - id: ruff-format    # 格式化

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
