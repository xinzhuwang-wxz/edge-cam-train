# 检测正式训练轮 · 全源装配（docs/detect/round2-数据计划.md）。
# 源：round1 复用(ena24+caltech_ct) + OIV7(person 3k+bird) + Roboflow(feeder 域 bird) + COCO(eval_only)。
# iNat(MD 伪标注 bird) MD 打框后再加一行 inat_md。分布：bird 命门最多、person~3k、other_animal 压。
# 跑：python -m edge_cam.data.adapters.detect.build --config configs/data/detect_round2.yaml
name: detect_round2
version: v1
raw_root: /root/autodl-tmp/detect_raw
out_dir: /root/autodl-tmp/detect_round2

datasets:
  # ── round1 复用（相机陷阱域）──
  ena24:
    negative_quota: 0
    split_ratios: [0.7, 0.15, 0.15] # 固定 test（scaling 同一 held-out）
  caltech_ct:
    negative_quota: 6000
    max_per_class: { other_animal: 5000 } # 压 other_animal（round1 过载）
    split_ratios: [0.7, 0.15, 0.15]

  # ── 新源 ──
  open_images_v7: {} # bird 6k(网图) + person 3k（下载脚本 caps 覆写，避网图域主导）
  # ── feeder 域 bird（观鸟器场景主力，按域优先）──
  roboflow_feeder: {} # feeder-cam（bird-recognition，3135，5 种→bird）
  roboflow_meproject: {} # ★ 真 feeder-cam 定拍（时间戳），观鸟器域金标准（813）
  roboflow_birdv2: # 清晰鸟类摄影 36 种→bird（3762 源/8658 增强），cap 避增强冗余主导
    max_per_class: { bird: 4000 }
  # ── iNat 教师伪标注（降级：域错配，只收 auto 清晰子集作多样性补充；不做 LS 人审）──
  inat_md: {} # auto（md_pseudo，1209 清晰鸟），读 inat_md_coco.json

  # ── eval_only（防许可传染）──
  coco2017: {}
